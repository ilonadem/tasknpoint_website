# .github/workflows/pages.yml
name: Deploy static site to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true           # fetch LFS pointers as real files
      - run: git lfs checkout  # replace any remaining pointers
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .             # change if your site lives elsewhere
      - id: deployment
        uses: actions/deploy-pages@v4
